<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI LinkedIn Post Generator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --primary-color: #0077b5;
            --bg-color: #f7f9fb;
        }
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
        }
        .card {
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
        }
        .btn-primary {
            background-color: var(--primary-color);
            transition: background-color 0.2s;
        }
        .btn-primary:hover {
            background-color: #005f90;
        }
        .btn-primary:disabled {
            background-color: #93c5fd;
            cursor: not-allowed;
        }
        .loader {
            border-top-color: #ffffff;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin {
            0%   { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body class="p-4 md:p-8 min-h-screen flex items-center justify-center">

    <div class="w-full max-w-4xl">
        <!-- Header -->
        <header class="text-center mb-8">
            <h1 class="text-4xl font-extrabold text-gray-900 flex items-center justify-center gap-3">
                <i data-lucide="linkedin" class="w-9 h-9 text-blue-600"></i>
                AI LinkedIn Content Studio
            </h1>
            <p class="text-gray-500 mt-2 text-base">Generate professional, engagement-boosting posts instantly.</p>
        </header>

        <!-- Main Card -->
        <div class="card bg-white p-6 md:p-10 rounded-2xl">

            <!-- Input Section -->
            <section id="input-section" class="mb-8">
                <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-4">
                    <!-- Language -->
                    <div>
                        <label for="language" class="block text-sm font-semibold text-gray-700 mb-2">Language</label>
                        <select id="language" class="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 bg-white">
                            <option value="English">🇬🇧 English</option>
                            <option value="Spanish">🇪🇸 Spanish</option>
                            <option value="German">🇩🇪 German</option>
                            <option value="French">🇫🇷 French</option>
                            <option value="Hindi">🇮🇳 Hindi</option>
                            <option value="Bangla">🇧🇩 Bangla</option>
                        </select>
                    </div>
                    <!-- Tone -->
                    <div>
                        <label for="tone" class="block text-sm font-semibold text-gray-700 mb-2">Tone</label>
                        <select id="tone" class="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 bg-white">
                            <option value="Professional">💼 Professional</option>
                            <option value="Inspirational">🌟 Inspirational</option>
                            <option value="Casual">😊 Casual</option>
                            <option value="Thought Leadership">🧠 Thought Leadership</option>
                        </select>
                    </div>
                    <!-- Topic -->
                    <div class="md:col-span-1">
                        <label for="topic" class="block text-sm font-semibold text-gray-700 mb-2">Topic or Theme</label>
                        <input
                            type="text"
                            id="topic"
                            placeholder="e.g. AI in Healthcare, Remote Work…"
                            class="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
                        >
                    </div>
                </div>

                <!-- Generate Button -->
                <button
                    id="generate-button"
                    onclick="generatePost()"
                    class="btn-primary text-white font-semibold py-3 px-6 rounded-lg w-full flex items-center justify-center gap-3 shadow-md hover:shadow-lg transition duration-200 mt-2"
                    disabled
                >
                    <i data-lucide="sparkles" class="w-5 h-5"></i>
                    <span id="button-text">Generate Engaging Post</span>
                    <div id="loading-spinner" class="loader rounded-full border-4 border-t-4 border-white/40 h-5 w-5 hidden"></div>
                </button>
            </section>

            <!-- Output Section -->
            <section id="output-section" class="mt-8 border-t pt-6 hidden">
                <h2 class="text-xl font-bold text-gray-800 mb-4">Generated Content</h2>

                <!-- Tabs -->
                <div class="flex border-b mb-4 gap-1">
                    <button class="tab-button px-4 py-2 text-sm font-medium border-b-2 border-blue-500 text-blue-600 focus:outline-none" data-tab="formatted">
                        Formatted Post
                    </button>
                    <button class="tab-button px-4 py-2 text-sm font-medium text-gray-500 hover:text-gray-700 focus:outline-none" data-tab="raw">
                        Raw JSON
                    </button>
                </div>

                <!-- Formatted Tab -->
                <div id="tab-formatted" class="tab-content bg-gray-50 p-6 rounded-xl border relative">
                    <h3 id="post-title" class="text-xl font-bold mb-3 text-blue-700"></h3>
                    <p id="post-content" class="whitespace-pre-wrap text-gray-700 leading-relaxed"></p>
                    <p id="post-cta" class="mt-4 font-semibold text-green-600"></p>
                    <p id="post-hashtags" class="mt-2 text-sm text-blue-500"></p>

                    <button onclick="copyToClipboard('full-post-text')" title="Copy to Clipboard"
                        class="absolute top-3 right-3 text-gray-400 hover:text-blue-500 p-2 rounded-full transition">
                        <i data-lucide="copy" class="w-5 h-5"></i>
                    </button>
                    <!-- Hidden element that holds the full copyable text -->
                    <span id="full-post-text" class="hidden"></span>
                </div>

                <!-- Raw JSON Tab -->
                <div id="tab-raw" class="tab-content hidden bg-gray-900 p-6 rounded-xl relative">
                    <pre id="raw-json" class="text-sm text-green-300 overflow-x-auto whitespace-pre-wrap"></pre>
                    <button onclick="copyToClipboard('raw-json')" title="Copy JSON"
                        class="absolute top-3 right-3 text-gray-400 hover:text-blue-500 p-2 rounded-full transition">
                        <i data-lucide="copy" class="w-5 h-5"></i>
                    </button>
                </div>
            </section>
        </div>
    </div>

    <!-- Toast Notification -->
    <div id="toast" class="fixed bottom-5 right-5 px-5 py-3 rounded-lg shadow-xl text-white text-sm font-medium hidden transition-all duration-300 z-50"></div>

    <script>
        // ---------------------------------------------------------------------------
        // Config
        // When running via Docker + Nginx, requests go through the /api/ proxy.
        // When running the backend locally (uvicorn), set this to http://127.0.0.1:8000
        // ---------------------------------------------------------------------------
        const API_BASE = window.location.hostname === "localhost" || window.location.hostname === "127.0.0.1"
            ? "http://127.0.0.1:8000"   // Direct local dev
            : "/api";                    // Docker / Nginx proxy

        // DOM refs
        const topicInput      = document.getElementById("topic");
        const languageSelect  = document.getElementById("language");
        const toneSelect      = document.getElementById("tone");
        const generateBtn     = document.getElementById("generate-button");
        const buttonText      = document.getElementById("button-text");
        const spinner         = document.getElementById("loading-spinner");
        const outputSection   = document.getElementById("output-section");
        const toast           = document.getElementById("toast");

        // Enable button only when topic has a value
        topicInput.addEventListener("input", () => {
            generateBtn.disabled = topicInput.value.trim() === "";
        });

        window.addEventListener("load", () => {
            lucide.createIcons();
            generateBtn.disabled = topicInput.value.trim() === "";
        });

        // ---------------------------------------------------------------------------
        // Generate post
        // ---------------------------------------------------------------------------
        async function generatePost() {
            const topic    = topicInput.value.trim();
            const language = languageSelect.value;
            const tone     = toneSelect.value;

            if (!topic) {
                showToast("Please enter a topic first.", true);
                return;
            }

            // Loading state
            setLoading(true);
            outputSection.classList.add("hidden");

            try {
                const response = await fetch(`${API_BASE}/generate`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ topic, language, tone }),
                });

                if (!response.ok) {
                    const err = await response.json().catch(() => ({}));
                    throw new Error(err.detail || `HTTP ${response.status}`);
                }

                const data = await response.json();
                renderPost(data);
                showToast("Post generated successfully! ✨");

            } catch (error) {
                console.error(error);
                const isNetworkError = error.message.includes("fetch") || error.message.includes("Failed");
                showToast(
                    isNetworkError
                        ? "Cannot reach the backend. Is the server running on port 8000?"
                        : `Error: ${error.message}`,
                    true
                );
            } finally {
                setLoading(false);
            }
        }

        // ---------------------------------------------------------------------------
        // Render
        // ---------------------------------------------------------------------------
        function renderPost(data) {
            const title    = data.title          || "";
            const content  = data.content        || "";
            const cta      = data.call_to_action || "";
            const hashtags = (data.hashtags || []).map(t => `#${t}`).join(" ");

            document.getElementById("post-title").textContent    = title;
            document.getElementById("post-content").textContent  = content;
            document.getElementById("post-cta").textContent      = cta;
            document.getElementById("post-hashtags").textContent = hashtags;

            // Build full copyable text
            document.getElementById("full-post-text").textContent =
                [title, content, cta, hashtags].filter(Boolean).join("\n\n");

            document.getElementById("raw-json").textContent = JSON.stringify(data, null, 2);

            outputSection.classList.remove("hidden");
            activateTab("formatted");
            lucide.createIcons();
        }

        // ---------------------------------------------------------------------------
        // Tabs
        // ---------------------------------------------------------------------------
        function activateTab(name) {
            document.querySelectorAll(".tab-button").forEach(btn => {
                const active = btn.dataset.tab === name;
                btn.classList.toggle("border-blue-500", active);
                btn.classList.toggle("text-blue-600",   active);
                btn.classList.toggle("text-gray-500",   !active);
                btn.classList.toggle("border-transparent", !active);
            });
            document.querySelectorAll(".tab-content").forEach(el => {
                el.classList.toggle("hidden", el.id !== `tab-${name}`);
            });
        }

        document.querySelectorAll(".tab-button").forEach(btn => {
            btn.addEventListener("click", () => activateTab(btn.dataset.tab));
        });

        // ---------------------------------------------------------------------------
        // Copy to clipboard
        // ---------------------------------------------------------------------------
        function copyToClipboard(elementId) {
            const text = document.getElementById(elementId).textContent;
            navigator.clipboard.writeText(text)
                .then(() => showToast("Copied to clipboard!"))
                .catch(() => {
                    // Fallback for older browsers
                    const ta = document.createElement("textarea");
                    ta.value = text;
                    document.body.appendChild(ta);
                    ta.select();
                    document.execCommand("copy");
                    document.body.removeChild(ta);
                    showToast("Copied!");
                });
        }

        // ---------------------------------------------------------------------------
        // Toast
        // ---------------------------------------------------------------------------
        function showToast(message, isError = false) {
            toast.textContent = message;
            toast.className = `fixed bottom-5 right-5 px-5 py-3 rounded-lg shadow-xl text-white text-sm font-medium z-50 ${
                isError ? "bg-red-600" : "bg-green-600"
            }`;
            toast.classList.remove("hidden");
            setTimeout(() => toast.classList.add("hidden"), 4000);
        }

        // ---------------------------------------------------------------------------
        // Loading state
        // ---------------------------------------------------------------------------
        function setLoading(loading) {
            generateBtn.disabled   = loading;
            topicInput.disabled    = loading;
            languageSelect.disabled = loading;
            toneSelect.disabled    = loading;
            buttonText.textContent = loading ? "Generating…" : "Generate Engaging Post";
            spinner.classList.toggle("hidden", !loading);
        }
    </script>
</body>
</html>
