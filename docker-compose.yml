version: '3.8'

services:

  # ── FastAPI Backend ────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: linkedin-post-generator-api
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - BASE_URL=${BASE_URL:-https://models.github.ai/inference}
      - API_KEY=${API_KEY}
      - MODEL_NAME=${MODEL_NAME:-gpt-4o-mini}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - linkedin-app-network

  # ── Nginx Frontend ─────────────────────────────────────────
  frontend:
    image: nginx:alpine
    container_name: linkedin-post-generator-frontend
    ports:
      - "80:80"          # Access at http://localhost
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - linkedin-app-network

  # ── Optional: Local Ollama ─────────────────────────────────
  # Uncomment the block below if you want to run local models.
  # Then set BASE_URL=http://ollama:11434 in your .env file.
  #
  # ollama:
  #   image: ollama/ollama:latest
  #   container_name: ollama-server
  #   ports:
  #     - "11434:11434"
  #   volumes:
  #     - ollama_data:/root/.ollama
  #   restart: unless-stopped
  #   networks:
  #     - linkedin-app-network

networks:
  linkedin-app-network:
    driver: bridge

